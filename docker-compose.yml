services:
  minio:
    image: minio/minio:RELEASE.2023-12-07T04-16-00Z
    restart: unless-stopped
    ports:
      - 9222:9222
      - 9333:9333
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123456
    entrypoint: sh
    command: "-c 'mkdir -p /data/ex-ftp-test && minio server --address :9222 --console-address :9333 /data'"

volumes:
  minio-data: {}
